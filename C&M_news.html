<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 뉴스</title>

<style>
body { font-family: Arial; background:#f5f7fb; padding:20px; }

.container { max-width:900px; margin:auto; }

.card {
  background:white;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.date { font-size:12px; color:#888; margin-bottom:6px; }
.title { font-size:18px; font-weight:bold; margin-bottom:10px; }

.badge {
  display:inline-block;
  padding:4px 8px;
  font-size:11px;
  border-radius:8px;
  background:#eee;
  margin-right:6px;
}

.signal {
  display:inline-block;
  width:10px;
  height:10px;
  border-radius:50%;
  margin-right:6px;
}

.red { background:#e74c3c; }
.yellow { background:#f1c40f; }
.green { background:#2ecc71; }

a { text-decoration:none; color:black; }
</style>

</head>

<body>

<h2>📡 AI 뉴스 (6G · 통신 · 우주 · IoT · 표준)</h2>
<div class="container" id="news"></div>

<script>

// ✅ 확장 키워드
const PRIMARY = [
  "6G","5G","통신","네트워크","위성","우주",
  "IoT","AI","미디어","코덱","데이터센터"
];

const SECONDARY = [
  "표준","표준화","국제표준","3GPP","ETSI","ITU",
  "특허","특허풀","기술","개발","협력"
];

const KEYWORDS = `(${PRIMARY.join(" OR ")}) (${SECONDARY.join(" OR ")})`;

const RSS_URL = "https://news.google.com/rss/search?q="
  + encodeURIComponent(KEYWORDS)
  + "&hl=ko&gl=KR&ceid=KR:ko";

// ✅ count=50 추가 → 뉴스 개수 확대
const API_URL =
  "https://api.rss2json.com/v1/api.json?rss_url="
  + encodeURIComponent(RSS_URL)
  + "&count=50";

fetch(API_URL)
.then(res => res.json())
.then(data => {

  const container = document.getElementById("news");
  container.innerHTML = "";

  const now = new Date();
  const twoMonthsAgo = new Date();
  twoMonthsAgo.setMonth(now.getMonth() - 2);

  // ✅ 최근 2개월 필터
  const filtered = data.items.filter(item => {
    const pub = new Date(item.pubDate);
    return pub >= twoMonthsAgo;
  });

  filtered.forEach(item => {

    const title = item.title;
    const link = item.link;
    const date = new Date(item.pubDate).toLocaleDateString("ko-KR");

    // 카테고리
    let category = "기타";
    if (title.includes("6G")) category = "6G";
    else if (title.includes("우주") || title.includes("위성")) category = "우주";
    else if (title.includes("IoT")) category = "IoT";
    else if (title.includes("표준")) category = "표준";
    else if (title.includes("통신")) category = "통신";

    // 신호등
    let signalClass = "green";
    if (title.includes("투자") || title.includes("출시") || title.includes("확장"))
      signalClass = "red";
    else if (title.includes("협력") || title.includes("개발"))
      signalClass = "yellow";

    container.innerHTML += `
      <div class="card">

        <div class="date">📅 ${date}</div>

        <a href="${link}" targetlass="title">${title}</div>
        </a>

        <div>
          <span class="signal ${signalClass}"></span>
          <span class="badge">${category}</span>
        </div>

      </div>
    `;
  });

  if(filtered.length === 0) {
    container.innerHTML = "최근 2개월 내 뉴스가 없습니다.";
  }

})
.catch(() => {
  document.getElementById("news").innerHTML = "뉴스 로드 실패";
});
</script>

</body>
</html>
