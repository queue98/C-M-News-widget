<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 뉴스 대시보드</title>

<style>
body { font-family: sans-serif; background:#f5f7fb; margin:0; }
.container { max-width:900px; margin:auto; padding:20px; }

h1 { font-size:20px; }

.card {
  background:white;
  border-radius:12px;
  margin-top:16px;
  overflow:hidden;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.thumb {
  width:100%;
  height:180px;
  background-size:cover;
  background-position:center;
}

.content {
  padding:14px;
}

.title a {
  color:#1a73e8;
  font-weight:bold;
  text-decoration:none;
}

.summary { font-size:13px; margin:8px 0; }

.meta { font-size:11px; color:gray; }

.tag {
  background:#e8f0fe;
  padding:3px 6px;
  border-radius:6px;
}

.score {
  float:right;
  font-weight:bold;
}

.filter button {
  margin:4px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#ddd;
  cursor:pointer;
}
.filter button.active {
  background:#1a73e8;
  color:white;
}
</style>

</head>

<body>

<div class="container">

<h1>📡 AI 뉴스 (6G · 통신 · 우주 · IoT · 표준)</h1>

<div class="filter">
  <button onclick="setFilter('ALL')">전체</button>
  <button onclick="setFilter('6G')">6G</button>
  <button onclick="setFilter('우주')">우주</button>
  <button onclick="setFilter('IoT')">IoT</button>
  <button onclick="setFilter('표준')">표준</button>
</div>

<div id="news"></div>

</div>

<script>

// ✅ GPT KEY
const OPENAI_API_KEY = "여기에_API_KEY";

// ✅ 상태
let NEWS_DATA = [];
let CURRENT_FILTER = "ALL";

// ✅ 🔥 개선된 검색식 (핵심)
const KEYWORDS =
  '(6G OR 통신 OR telecom OR media OR 미디어 OR satellite OR 위성 OR IoT) ' +
  '(standard OR 표준 OR 3GPP OR ITU)';

const RSS_URL =
  "https://news.google.com/rss/search?q=" + encodeURIComponent(KEYWORDS) +
  "&hl=ko&gl=KR&ceid=KR:ko";

// ✅ 안정 proxy
const API =
  "https://api.allorigins.win/get?url=" + encodeURIComponent(RSS_URL);

// ✅ 원본 링크 추출 (핵심 해결)
function extractRealLink(link){
  try{
    const url = new URL(link);
    const params = new URLSearchParams(url.search);
    if(params.get("url")){
      return params.get("url");
    }
    return link;
  } catch {
    return link;
  }
}

// ✅ 썸네일 추출
function extractImage(desc){
  const match = desc.match(/<img.*?src="(.*?)"/);
  return match ? match[1] : "https://via.placeholder.com/800x400?text=No+Image";
}

// ✅ 태그
function getTag(text){
  if(text.includes("6G")) return "6G";
  if(text.includes("위성") || text.includes("우주")) return "우주";
  if(text.includes("IoT")) return "IoT";
  if(text.includes("표준") || text.includes("3GPP")) return "표준";
  return "통신";
}

// ✅ Signal Score
function getScore(text){
  if(text.includes("시장") || text.includes("상용화")) return "HIGH";
  if(text.includes("개발") || text.includes("연구")) return "MID";
  return "LOW";
}

// ✅ GPT 요약
async function summarize(text){

  if(!OPENAI_API_KEY.includes("API")){
    return "요약 없음 (API key 넣으면 활성화)";
  }

  try{
    const res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+OPENAI_API_KEY
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {
            role:"user",
            content:`뉴스를 2줄 요약 + 사업 insight 1줄:\n${text}`
          }
        ]
      })
    });

    const data = await res.json();
    return data.choices[0].message.content;

  }catch{
    return "요약 실패";
  }
}

// ✅ RSS 파싱
function parseRSS(xml){
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml,"text/xml");

  return [...doc.querySelectorAll("item")].slice(0,d.map(n => ({
    ...n,
    tag: getTag(n.title),
    score: getScore(n.title)
  }));

  render();

})
.catch(()=>{
  document.getElementById("news").innerHTML = "❌ 뉴스 로드 실패";
});

</script>

</body>
</html>
