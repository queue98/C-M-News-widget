<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 뉴스 대시보드</title>

<style>
body { font-family: sans-serif; background:#f5f7fb; margin:0; }
.container { max-width:900px; margin:auto; padding:20px; }

/* ✅ 제목 강조 */
.title a {
  font-size:18px;
  font-weight:bold;
  color:#1a73e8;
  text-decoration:none;
}

/* 카드 */
.card {
  background:white;
  border-radius:12px;
  margin-top:16px;
  overflow:hidden;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* 썸네일 */
.thumb {
  width:100%;
  height:180px;
  background-size:cover;
  background-position:center;
}

.content {
  padding:14px;
}

.summary { font-size:13px; margin:8px 0; }

.meta {
  font-size:11px;
  color:gray;
  margin-top:6px;
}

/* 태그 */
.tag {
  background:#e8f0fe;
  padding:3px 6px;
  border-radius:6px;
  margin-right:4px;
}

/* ✅ Signal Score (신호등) */
.score {
  float:right;
  font-size:16px;
}

.red { color:#e53935; }     /* HIGH */
.yellow { color:#fbc02d; }  /* MID */
.green { color:#43a047; }   /* LOW */

/* 필터 */
.filter button {
  margin:4px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#ddd;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>📡 AI 뉴스 (6G · 통신 · 우주 · IoT · 표준)</h2>

<div id="news"></div>

</div>

<script>

// ✅ 검색식 (품질 유지)
const KEYWORDS =
 '(6G OR 통신 OR telecom OR media OR 미디어 OR satellite OR 위성 OR IoT) ' +
 '(standard OR 표준 OR 3GPP OR ITU)';

const RSS_URL =
 "https://news.google.com/rss/search?q=" + encodeURIComponent(KEYWORDS) +
 "&hl=ko&gl=KR&ceid=KR:ko";

const API =
 "https://api.allorigins.win/get?url=" + encodeURIComponent(RSS_URL);

// ✅ 링크 변환
function extractRealLink(link){
  try{
    const u = new URL(link);
    const p = new URLSearchParams(u.search);
    return p.get("url") || link;
  } catch{return link;}
}

// ✅ 이미지
function extractImage(desc){
  const m = desc.match(/<img.*?src="(.*?)"/);
  return m ? m[1] : "https://via.placeholder.com/800x400";
}

// ✅ 빠른 요약 (초경량)
function quickSummary(desc){
  const text = desc우주") || text.includes("위성")) return "우주";
  if(text.includes("IoT")) return "IoT";
  if(text.includes("표준")) return "표준";
  return "통신";
}

// ✅ Signal Score + 색상
function getScore(text){
  if(text.includes("시장") || text.includes("상용화")){
    return {label:"🔴", cls:"red"};
  }
  if(text.includes("개발") || text.includes("연구")){
    return {label:"🟡", cls:"yellow"};
  }
  return {label:"🟢", cls:"green"};
}

// ✅ RSS 파싱
function parseRSS(xml){
  const doc = new DOMParser().parseFromString(xml,"text/xml");

  return [...doc.querySelectorAll("item")]
    .slice(0,5)
    .map(item=>{

      const desc = item.querySelector("description").textContent;
      const title = item.querySelector("title").textContent;

      const score = getScore(title);

      return {
        title,
        link: extractRealLink(item.querySelector("link").textContent),
        image: extractImage(desc),
        summary: quickSummary(desc),
        tag: getTag(title),
        score: score
      };
    });
}

// ✅ 렌더 (빠름)
function render(list){

  const wrap = document.getElementById("news");
  wrap.innerHTML = "";

  list.forEach(n=>{

    const html = `
    <div class="card">

      <div class="thumb" style="background-image:url('${n.image}')"></div>

      <div class="content">

        <div class="title">
          <a href="${n.link}" target        <span class="score ${n.score.cls}">${n.score.label}</span>
        </div>

        <div class="summary">${n.summary}</div>

        <div class="meta">
          <span class="tag">${n.tag}</span>
        </div>

      </div>
    </div>
    `;

    wrap.insertAdjacentHTML("beforeend", html);
  });
}

// ✅ 실행
fetch(API)
.then(r=>r.json())
.then(data=>{
  const parsed = parseRSS(data.contents);
  render(parsed);
})
.catch(()=>{
  document.getElementById("news").innerHTML = "❌ 뉴스 로드 실패";
});

</script>

</body>
</html>
