<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 뉴스 대시보드</title>

<style>
body { font-family: sans-serif; background:#f5f7fb; margin:0; }
.container { max-width:900px; margin:auto; padding:20px; }

h1 { font-size:20px; }

.card {
  background:white; border-radius:12px;
  padding:15px; margin-top:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.title a { color:#1a73e8; font-weight:bold; text-decoration:none;}
.summary { font-size:13px; margin:8px 0; }
.meta { font-size:11px; color:gray; }

.tag {
  background:#e8f0fe; padding:3px 6px;
  border-radius:6px; margin-right:4px;
}

.score {
  float:right;
  font-weight:bold;
}

.filter button {
  margin:4px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#ddd;
  cursor:pointer;
}
.filter button.active { background:#1a73e8; color:white; }

</style>
</head>

<body>

<div class="container">
<h1>📡 AI 뉴스 (6G · 통신 · 우주 · IoT · 표준)</h1>

<div class="filter">
  <button onclick="setFilter('ALL')">전체</button>
  <button onclick="setFilter('6G')">6G</button>
  <button onclick="setFilter('우주')">우주</button>
  <button onclick="setFilter('IoT')">IoT</button>
  <button onclick="setFilter('표준')">표준</button>
  <button onclick="setFilter('통신')">통신</button>
</div>

<div id="news"></div>
</div>

<script>

// ✅ 설정
const OPENAI_API_KEY = "여기에_API_키를_넣으세요";

// ✅ 상태
let CURRENT_FILTER = "ALL";
let NEWS_DATA = [];

// ✅ RSS URL
const KEYWORDS = "6G OR 통신 OR 위성 OR 우주 OR IoT OR 표준";
const RSS_URL = "https://news.google.com/rss/search?q=" + encodeURIComponent(KEYWORDS) + "&hl=ko&gl=KR&ceid=KR:ko";

// ✅ CORS 해결
const API = "https://api.allorigins.win/get?url=" + encodeURIComponent(RSS_URL);

// ✅ 태그 추출
function getTag(text){
  if(text.includes("6G")) return "6G";
  if(text.includes("위성") || text.includes("우주")) return "우주";
  if(text.includes("IoT")) return "IoT";
  if(text.includes("표준")) return "표준";
  return "통신";
}

// ✅ Signal Score
function getScore(text){
  if(text.includes("투자") || text.includes("시장") || text.includes("상용화")) return "HIGH";
  if(text.includes("연구") || text.includes("개발")) return "MID";
  return "LOW";
}

// ✅ GPT 요약
async function getSummary(text){

  if(!OPENAI_API_KEY.includes("API")){
    return "(API Key 넣으면 AI 요약 제공됩니다)";
  }

  try{
    const res = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+OPENAI_API_KEY
      },
      body:JSON.stringify({
        model:"gpt-4o-mini",
        messages:[
          {
            role:"user",
            content:`다음 뉴스를 2줄 요약 + 사업 Implication 1줄:\n${text}`
          }
        ]
      })
    });

    const data = await res.json();
    return data.choices[0].message.content;

  } catch(e){
    return "요약 실패";
  }
}

// ✅ RSS 파싱
function parseRSS(xml){
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, "text/xml");
  const items = doc.querySelectorAll("item");

  return Array.from(items).slice(0,5).map(item => ({
    title: item.querySelector("title").textContent,
    link: item.querySelector("link").textContent,
    desc: item.querySelector("description").textContent,
    date: item.querySelector("pubDate").textContent
  }));
}

// ✅ 렌더
async function render(){

  const container = document.getElementById("news");
  container.innerHTML = "불러오는 중...";

  const filtered = NEWS_DATA.filter(n => 
    CURRENT_FILTER==="ALL" || n.tag===CURRENT_FILTER
  );

  container.innerHTML = "";

  for(let item of filtered){

    const summary = await getSummary(item.desc);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">
        <a href="${item.link}" target="_blank <span class="score">${item.score}</span>
      </div>
      <div class="summary">${summary}</div>
      <div class="meta">
        <span class="tag">${item.tag}</span>
        ${new Date(item.date).toLocaleDateString()}
      </div>
    `;

    container.appendChild(div);
  }
}

// ✅ 필터
function setFilter(f){
  CURRENT_FILTER = f;
  render();
}

// ✅ 초기 로드
fetch(API)
.then(res=>res.json())
.then(data=>{

  const parsed = parseRSS(data.contents);

  NEWS_DATA = parsed.map(n => {
    const tag = getTag(n.title);
    return {
      ...n,
      tag: tag,
      score: getScore(n.title)
    };
  });

  render();

})
.catch(err=>{
  document.getElementById("news").innerHTML = "❌ 뉴스 불러오기 실패";
});

</script>

</body>
</html>
