<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 뉴스 대시보드</title>
<style>
body {
  font-family: "Segoe UI", sans-serif;
  margin: 0;
  background: #f5f7fb;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  font-size: 20px;
  margin-bottom: 16px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.title {
  font-size: 15px;
  font-weight: bold;
  color: #1a73e8;
  margin-bottom: 6px;
}

.summary {
  font-size: 13px;
  color: #444;
  margin-bottom: 8px;
}

.meta {
  font-size: 11px;
  color: gray;
}

.tag {
  display: inline-block;
  background: #e8f0fe;
  padding: 2px 6px;
  border-radius: 6px;
  font-size: 11px;
  margin-right: 4px;
}
</style>
</head>

<body>
<div class="container">
  <h1>📡 AI 요약 뉴스 (6G · 통신 · 우주 · IoT · 표준)</h1>
  <div id="news"></div>
</div>

<script>

// ✅ 검색 키워드
const KEYWORDS = "6G OR 통신 OR 위성 OR 우주 OR IoT OR 표준";

// ✅ Google News RSS
const RSS_URL = "https://news.google.com/rss/search?q=" + encodeURIComponent(KEYWORDS) + "&hl=ko&gl=KR&ceid=KR:ko";

// ✅ RSS -> JSON 변환 API (CORS 해결)
const API = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(RSS_URL);

// ✅ 키워드 태깅
function getTag(text){
  if(text.includes("6G")) return "6G";
  if(text.includes("위성") || text.includes("우주")) return "우주";
  if(text.includes("IoT")) return "IoT";
  if(text.includes("표준")) return "표준";
  return "통신";
}

// ✅ 간단 AI 요약 (룰 기반)
function summarize(text){
  const clean = text.replace(/<[^>]+>/g,"");
  let sentences = clean.split(".").slice(0,2).join(".");
  if(sentences.length < 40) {
    sentences = clean.substring(0,100);
  }
  return sentences + "...";
}

// ✅ 데이터 로드
fetch(API)
.then(res => res.json())
.then(data => {

  const container = document.getElementById("news");

  // 최신 5개만
  const items = data.items.slice(0,5);

  items.forEach(item => {

    const tag = getTag(item.title);
    const summary = summarize(item.description);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">
        <a href="${item.linkitle}</a>
      </div>

      <div class="summary">${summary}</div>

      <div class="meta">
        <span class="tag">${tag}</span>
        ${new Date(item.pubDate).toLocaleDateString()}
      </div>
    `;

    container.appendChild(card);
  });

});

</script>

</body>
</html>
