<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 뉴스</title>

<style>
body { font-family: Arial; background:#f5f7fb; padding:20px; }

.container { max-width:900px; margin:auto; }

.card {
  background:white;
  border-radius:16px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.date { font-size:12px; color:#888; margin-bottom:6px; }

.title {
  font-size:18px;
  font-weight:bold;
  margin-bottom:8px;
}

.summary {
  font-size:13px;
  color:#444;
  margin-bottom:10px;
  line-height:1.4;
}

/* ✅ 박스 안 정렬 */
.meta-box {
  display:inline-flex;
  align-items:center;
  padding:6px 10px;
  border-radius:10px;
  background:#f1f3f6;
  gap:6px;
}

.badge {
  font-size:11px;
  padding:3px 6px;
  border-radius:6px;
  background:#ddd;
}

.signal {
  width:10px;
  height:10px;
  border-radius:50%;
}

.red { background:#e74c3c; }
.yellow { background:#f1c40f; }
.green { background:#2ecc71; }

a { text-decoration:none; color:black; }
</style>

</head>

<body>

<h2>📡 AI 뉴스 (6G · 통신 · 우주 · IoT · 표준)</h2>
<div class="container" id="news"></div>

<script>

// ✅ 키워드
const PRIMARY = [
  "6G","5G","통신","네트워크","위성","우주",
  "IoT","AI","미디어","코덱","데이터센터"
];

const SECONDARY = [
  "표준","표준화","국제표준","3GPP","ETSI","ITU",
  "특허","특허풀","기술","개발","협력","투자","출시"
];

const KEYWORDS = `(${PRIMARY.join(" OR ")}) (${SECONDARY.join(" OR ")})`;

const RSS_URL = "https://news.google.com/rss/search?q="
  + encodeURIComponent(KEYWORDS)
  + "&hl=ko&gl=KR&ceid=KR:ko";

const API_URL =
  "https://api.rss2json.com/v1/api.json?rss_url="
  + encodeURIComponent(RSS_URL)
  + "&count=50";

fetch(API_URL)
.then(res => res.json())
.then(data => {

  const container = document.getElementById("news");
  container.innerHTML = "";

  const now = new Date();
  const twoMonthsAgo = new Date();
  twoMonthsAgo.setMonth(now.getMonth() - 2);

  const filtered = data.items.filter(item => {
    const pub = new Date(item.pubDate);
    return pub >= twoMonthsAgo;
  });

  filtered.forEach(item => {

    const title = item.title;
    const link = item.link;
    const date = new Date(item.pubDate).toLocaleDateString("ko-KR");

    // ✅ AI 요약 (간단 버전)
    let summary = item.description
      .replace(/<[^>]*>/g, "")  // HTML 제거
      .replace(/\s+/g, " ")
      .trim();

    if (summary.length > 120)
      summary = summary.substring(0, 120) + "...";

    // ✅ 카테고리
    let category = "기타";
    if (title.includes("6G")) category = "6G";
    else if (title.includes("우주") || title.includes("위성")) category = "우주";
    else if (title.includes("IoT")) category = "IoT";
    else if (title.includes("표준")) category = "표준";
    else if (title.includes("통신")) category = "통신";

    // ✅ Signal Score (고도화)
    let score = 0;

    if (/투자|출시|확장|상용화|양산/.test(title)) score += 3;
    if (/협력|제휴|계약|개발/.test(title)) score += 2;
    if (/연구|검토|논의/.test(title)) score += 1;

    let signalClass = "green";
    let level = "LOW";

    if (score >= 3) {
      signalClass = "red";
      level = "HIGH";
    } else if (score === 2) {
      signalClass = "yellow";
      level = "MID";
    }

    container.innerHTML += `
      <div class="card">

        <div class="date">📅 ${date}</div>

        <a href="${link}" target="_s="title">${title}</div>
        </a>

        <div class="summary">${summary}</div>

        <div class="meta-box">
          <span class="signal ${signalClass}"></span>
          <span class="badge">${level}</span>
          <span class="badge">${category}</span>
        </div>

      </div>
    `;
  });

  if(filtered.length === 0) {
    container.innerHTML = "최근 2개월 내 뉴스가 없습니다.";
  }

})
.catch(() => {
  document.getElementById("news").innerHTML = "뉴스 로드 실패";
});

</script>

</body>
</html>
